services:
  # ── BACKEND ──────────────────────────────────────────────────────────────────
  - type: web
    name: cla-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # you set this manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: cla-db
          property: connectionString

  # ── FRONTEND ─────────────────────────────────────────────────────────────────
  - type: web
    name: cla-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # set to your backend URL after first deploy

databases:
  - name: cla-db
    plan: free
    databaseName: cla
